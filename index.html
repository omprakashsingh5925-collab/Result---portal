<!-- Student Result Portal -->
<h2>📚 Student Result Portal</h2>

<input type="text" id="roll" placeholder="Enter Roll Number"><br><br>
<input type="text" id="dob" placeholder="Enter Date of Birth"><br><br>

<p>Captcha: <span id="captcha">4589</span></p>
<input type="text" id="captchaInput" placeholder="Enter Captcha"><br><br>

<button onclick="checkResult()">Check Result</button>
<h3 id="result"></h3>

<div id="studentInfo" style="display:none;">
  <img id="photo" src="vivek.jpg" width="120"><br><br>

  <table border="1" cellpadding="8">
    <tr>
      <th>Subject</th>
      <th>Marks</th>
    </tr>
    <tr><td>Hindi</td><td>85</td></tr>
    <tr><td>English</td><td>78</td></tr>
    <tr><td>Math</td><td>92</td></tr>
    <tr><td>Science</td><td>88</td></tr>
    <tr><td>Social Science</td><td>81</td></tr>
  </table>

  <br>
  <button onclick="window.print()">Print Result</button>
</div>

<hr>

<!-- Calculator -->
<h2>🧮 Calculator</h2>

<input type="number" id="num1" placeholder="First Number"><br><br>
<input type="number" id="num2" placeholder="Second Number"><br><br>

<button onclick="add()">+</button>
<button onclick="sub()">-</button>
<button onclick="mul()">×</button>
<button onclick="div()">÷</button>

<h3 id="answer"></h3>

<hr>

<!-- Clock -->
<h2>⏰ Digital Clock</h2>
<h1 id="clock"></h1>

<hr>

<!-- Weather -->
<h2>🌦️ Weather App</h2>

<input type="text" id="city" placeholder="Enter City Name">
<button onclick="getWeather()">Search</button>

<h3 id="weather"></h3>

<hr>

<!-- Game -->
<h2>🎮 Number Guess Game</h2>

<p>1 se 10 ke beech ek number guess karo</p>

<input type="number" id="guess" placeholder="Enter Number">
<button onclick="checkGuess()">Check</button>

<h3 id="gameResult"></h3>

<script src="script.js"></script>

</body>
</html>
